<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pizzería</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&family=Exo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="container text-center py-4">
  <img src="img/logo.jpg" class="logo">
  <h1 class="titulo mt-2">SAMY'S PIZZA</h1>
</div>

<button class="btn btn-light position-fixed bottom-0 end-0 m-3"
  onclick="window.location.href='login.html'">
  ⚙️ Admin
</button>


<div class="container mb-4">
  <div id="carouselPizza" class="carousel slide" data-bs-ride="false">

  <div class="carousel-inner">

    <!-- SOLO UNO active -->
    <div class="carousel-item active">
      <img src="img/galeria1.jpg" class="d-block w-100 carousel-img">
    </div>

    <div class="carousel-item">
      <img src="img/galeria2.jpg" class="d-block w-100 carousel-img">
    </div>

    <div class="carousel-item">
      <img src="img/galeria3.jpg" class="d-block w-100 carousel-img">
    </div>

    <div class="carousel-item">
      <img src="img/galeria4.jpg" class="d-block w-100 carousel-img">
    </div>

    <div class="carousel-item">
      <img src="img/galeria5.jpg" class="d-block w-100 carousel-img">
    </div>

    <div class="carousel-item">
      <img src="img/galeria6.jpg" class="d-block w-100 carousel-img">
    </div>


  </div>

  <!-- BOTONES -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselPizza" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselPizza" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
</div>

<!-- Botón carrito -->
<div class="carrito-btn" onclick="abrirCarrito()">
  🛒 <span id="contador">0</span>
</div>


<!-- Categorías -->
<div class="container text-center mb-3">
  <button class="btn btn-danger m-1" onclick="filtrar('todos')">Todos</button>
  <button class="btn btn-warning m-1" onclick="filtrar('tradicional')">Tradicionales</button>
  <button class="btn btn-dark m-1" onclick="filtrar('especial')">Especiales</button>
  <button class="btn btn-success m-1" onclick="filtrar('bebida')">Bebidas</button>
  <button class="btn btn-info m-1" onclick="filtrar('promociones')">Promociones</button>
</div>



<!-- Contenedor dinámico -->
 
<div class="container">
  <div class="row" id="menuContainer"></div>
</div>

<!-- MODAL -->
<div class="modal fade" id="pizzaModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-custom">

      <img id="modalImg" class="modal-img">

      <div class="modal-body text-center">
        <h3 id="modalTitulo"></h3>
        <p id="modalDesc"></p>
        <h4 id="modalPrecio"></h4>
        <button class="btn btn-danger mt-2" onclick="agregarAlCarrito(
            document.getElementById('modalTitulo').innerText,
            document.getElementById('modalPrecio').innerText
            )">
            Agregar al carrito
        </button>

        <a id="btnWhatsapp" class="btn btn-success mt-3" target="_blank">
          Pedir por WhatsApp
        </a>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- MODAL CARRITO -->
<div class="modal fade" id="carritoModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-custom">

      <div class="modal-header">
        <h5>Tu pedido</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="listaCarrito"></div>

      <div class="modal-footer d-flex justify-content-between">
        <h5>Total: <span id="total">$0</span></h5>
        <button class="btn btn-success" onclick="enviarPedido()">
          Pedir por WhatsApp
        </button>
      </div>

    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
<div class="modal fade" id="confirmModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-custom text-center p-3">

      <h5>¿Eliminar producto?</h5>
      <p id="productoEliminar"></p>

      <div class="d-flex justify-content-around mt-3">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button class="btn btn-danger" id="btnConfirmarEliminar">
          Eliminar
        </button>
      </div>

    </div>
  </div>
</div>
<div class="modal fade" id="clienteModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-custom text-center p-4">

      <h5>Ingresa tu nombre</h5>

      <input type="text" id="nombreCliente" class="form-control mt-3" placeholder="Ej: Cristian">

      <button class="btn btn-success mt-3" onclick="confirmarPedido()">
        Continuar
      </button>

    </div>
  </div>
</div>
</body>
<footer class="footer mt-5">
  <div class="container text-center py-4">

    <p class="mb-3">© 2026 SAMY'S PIZZA. Todos los derechos reservados.</p>

    <div class="redes">

      <a href="https://www.instagram.com/samuel27espinel/?utm_source=ig_web_button_share_sheet" target="_blank" class="insta-link">
        <i class="bi bi-instagram"></i>
        Samuel David Espinel - Cocinero
      </a>

      <a href="https://www.instagram.com/criistian_solano/" target="_blank" class="insta-link">
        <i class="bi bi-instagram"></i>
        Cristian Solano - Desarrollo Web
      </a>

    </div>

  </div>
</footer>
</html>
