<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 bg-secondary text-center" style="width:300px;">

  <h4>🔐 Admin</h4>

  <input type="text" id="usuario" class="form-control mt-3" placeholder="Usuario">

<input type="password" id="password" class="form-control mt-2" placeholder="Contraseña">

  <button class="btn btn-success mt-3" onclick="login()">Entrar</button>

  <p id="error" class="text-danger mt-2"></p>

</div>

<script src="login.js"></script>

</body>
</html>
