<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Admin — Samy's Pizza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --accent: #ff3c00;
      --accent2: #ffb800;
      --green: #00e87a;
      --text: #f0ece4;
      --muted: #6b6b6b;
      --radius: 16px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -300px; left: -300px;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(255,60,0,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,184,0,0.04) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Big decorative text */
    .bg-text {
      position: fixed;
      bottom: -40px;
      left: -20px;
      font-family: var(--font-display);
      font-size: clamp(120px, 20vw, 220px);
      color: rgba(255,255,255,0.02);
      letter-spacing: 10px;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* CARD */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    /* Top accent bar */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    /* Logo */
    .login-logo {
      font-family: var(--font-display);
      font-size: 52px;
      letter-spacing: 4px;
      line-height: 1;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
    }

    .login-logo span { color: var(--accent); }

    .login-sub {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,60,0,0.08);
    }

    .form-control::placeholder { color: var(--muted); }

    /* Button */
    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: white;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: #e03500;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255,60,0,0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Error */
    #error {
      text-align: center;
      font-size: 13px;
      color: var(--accent);
      min-height: 20px;
      margin-top: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #error.visible { opacity: 1; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="bg-text">PIZZA</div>

  <div class="login-card">

    <div class="login-logo">SAMY'<span>S</span></div>
    <div class="login-sub">Panel de Administración</div>

    <div class="divider"><span>Acceso</span></div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="usuario" class="form-control" placeholder="Ingresa tu usuario" autocomplete="username">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') login()">
    </div>

    <button class="btn-login" onclick="login()">Entrar →</button>

    <p id="error"></p>

    <div class="login-footer">🍕 Samy's Pizza &copy; 2025</div>

  </div>

  <script>
    // Mostrar error con animación
    function mostrarError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('visible');
    }
  </script>

  <script src="login.js"></script>

</body>
</html>
