<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Samy's Pizza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: white;
    }

    .card-custom {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .header-admin {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pedido-card {
      background: #222;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      transition: 0.3s;
    }

    .pedido-card:hover {
      transform: scale(1.01);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .total-box {
      font-size: 1.3rem;
      font-weight: bold;
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="header-admin mb-4">
    <h2>📋 Panel de Pedidos</h2>

    <button class="btn btn-danger" onclick="cerrarSesion()">
      Cerrar sesión
    </button>
  </div>

  <!-- RESUMEN -->
  <div class="card-custom mb-4 text-center">
    <p class="mb-1">Total vendido</p>
    <div class="total-box" id="totalVentas">$0</div>
  </div>

  <div class="card-custom mb-4">

  <div class="row g-2">

    <!-- Buscar por cliente -->
    <div class="col-md-4">
      <input type="text" id="filtroCliente" class="form-control"
        placeholder="Buscar cliente o teléfono..."
        oninput="filtrarPedidos()">
    </div>

    <!-- Fecha desde -->
    <div class="col-md-3">
      <input type="date" id="fechaInicio" class="form-control"
        onchange="filtrarPedidos()">
    </div>

    <!-- Fecha hasta -->
    <div class="col-md-3">
      <input type="date" id="fechaFin" class="form-control"
        onchange="filtrarPedidos()">
    </div>

    <!-- Botón limpiar -->
    <div class="col-md-2">
      <button class="btn btn-warning w-100" onclick="limpiarFiltros()">
        Limpiar
      </button>
    </div>

  </div>

</div>

  <!-- LISTA -->
  <div id="listaPedidos"></div>

</div>

<script src="admin.js"></script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

  // Your Firebase configuration (replace with your actual config)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Make db available globally
  window.db = db;
  window.collection = collection;
  window.addDoc = addDoc;
  window.getDocs = getDocs;
  window.doc = doc;
  window.updateDoc = updateDoc;
  window.deleteDoc = deleteDoc;
</script>

</body>
</html>
